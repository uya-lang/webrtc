<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RK1106 Uya WebRTC Preview</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101418;
      color: #edf2f7;
    }
    body {
      margin: 0;
      padding: 24px;
    }
    main {
      max-width: 1080px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }
    video {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #05070a;
      border: 1px solid #2d3748;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    textarea {
      width: 100%;
      min-height: 220px;
      box-sizing: border-box;
      resize: vertical;
      font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      border: 1px solid #334155;
      background: #0b1015;
      color: #e5e7eb;
      padding: 10px;
    }
    input {
      min-width: min(520px, 100%);
      flex: 1;
      box-sizing: border-box;
      border: 1px solid #334155;
      background: #0b1015;
      color: #e5e7eb;
      padding: 9px 10px;
      font: inherit;
    }
    button {
      appearance: none;
      border: 1px solid #38bdf8;
      background: #0284c7;
      color: white;
      padding: 9px 12px;
      font: inherit;
      cursor: pointer;
    }
    button.secondary {
      border-color: #64748b;
      background: #1f2937;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .panel {
      display: grid;
      gap: 8px;
    }
    .status {
      min-height: 1.4em;
      color: #93c5fd;
      font-size: 14px;
      word-break: break-word;
    }
    .metrics {
      margin: 0;
      min-height: 3.5em;
      overflow-x: auto;
      color: #cbd5e1;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }
    label {
      font-size: 14px;
      color: #cbd5e1;
    }
    .inline-label {
      white-space: nowrap;
    }
  </style>
</head>
<body>
<main>
  <h1>RK1106 Uya WebRTC Preview</h1>
  <video id="remoteVideo" autoplay playsinline muted controls></video>
  <div class="row">
    <label class="inline-label" for="signalUrl">Signal URL</label>
    <input id="signalUrl" type="url" spellcheck="false" placeholder="http://HOST:8081/api">
  </div>
  <div class="row">
    <button id="autoSignal">Auto Signal</button>
    <button id="createOffer">Create Offer</button>
    <button id="publishOffer" class="secondary">Publish Offer</button>
    <button id="waitAnswer" class="secondary">Wait Answer</button>
    <button id="copyOffer" class="secondary">Copy Offer</button>
    <button id="setAnswer">Set Answer</button>
    <button id="closePeer" class="secondary">Close</button>
  </div>
  <div id="status" class="status">idle</div>
  <pre id="metrics" class="metrics">timing: idle</pre>
  <section class="grid">
    <div class="panel">
      <label for="offerBox">offer JSON</label>
      <textarea id="offerBox" spellcheck="false"></textarea>
    </div>
    <div class="panel">
      <label for="answerBox">answer JSON</label>
      <textarea id="answerBox" spellcheck="false"></textarea>
    </div>
  </section>
</main>
<script>
let pc = null;
let pollToken = 0;
let statsPollToken = 0;
let statsTimer = null;
let timing = {};
let latestStatsText = 'stats video: waiting';
let firstFrameWatchArmed = false;
const ANSWER_WAIT_TIMEOUT_MS = 240000;
const ANSWER_POLL_INTERVAL_MS = 200;

const statusEl = document.getElementById('status');
const metricsEl = document.getElementById('metrics');
const offerBox = document.getElementById('offerBox');
const answerBox = document.getElementById('answerBox');
const remoteVideo = document.getElementById('remoteVideo');
const signalUrl = document.getElementById('signalUrl');
remoteVideo.muted = true;

if (location.protocol === 'http:' || location.protocol === 'https:') {
  signalUrl.value = `${location.origin}/api`;
}

function timingDelta(name, base) {
  return timing[name] ? Math.round(timing[name] - base) : null;
}

function updatePreviewState() {
  const base = timing.start || timing.offerStart || performance.now();
  window.__rk1106PreviewState = {
    status: statusEl.textContent,
    metrics: metricsEl.textContent,
    latestStatsText,
    timing: {
      offerStart: timingDelta('offerStart', base),
      offerReady: timingDelta('offerReady', base),
      offerPublished: timingDelta('offerPublished', base),
      answerSet: timingDelta('answerSet', base),
      iceConnected: timingDelta('iceConnected', base),
      connected: timingDelta('connected', base),
      track: timingDelta('track', base),
      firstFrame: timingDelta('firstFrame', base),
      connectedToFirstFrame: timing.connected && timing.firstFrame
        ? Math.round(timing.firstFrame - timing.connected)
        : null,
      answerToFirstFrame: timing.answerSet && timing.firstFrame
        ? Math.round(timing.firstFrame - timing.answerSet)
        : null,
    },
  };
}

function setStatus(text) {
  statusEl.textContent = text;
  updatePreviewState();
}

function resetDiagnostics() {
  timing = {start: performance.now()};
  latestStatsText = 'stats video: waiting';
  firstFrameWatchArmed = false;
  renderDiagnostics();
}

function markTiming(name) {
  if (!timing.start) timing.start = performance.now();
  if (!timing[name]) {
    timing[name] = performance.now();
    console.info(`preview timing ${name}=${Math.round(timing[name] - timing.start)}ms`);
  }
  renderDiagnostics();
}

function timingPart(label, name, base) {
  if (!timing[name]) return null;
  return `${label}=${Math.round(timing[name] - base)}ms`;
}

function renderDiagnostics() {
  const base = timing.start || timing.offerStart || performance.now();
  const parts = [
    timingPart('offer', 'offerStart', base),
    timingPart('offerReady', 'offerReady', base),
    timingPart('offerPublished', 'offerPublished', base),
    timingPart('answerSet', 'answerSet', base),
    timingPart('iceConnected', 'iceConnected', base),
    timingPart('connected', 'connected', base),
    timingPart('track', 'track', base),
    timingPart('firstFrame', 'firstFrame', base),
  ].filter(Boolean);
  if (timing.connected && timing.firstFrame) {
    parts.push(`connectedToFirstFrame=${Math.round(timing.firstFrame - timing.connected)}ms`);
  }
  if (timing.answerSet && timing.firstFrame) {
    parts.push(`answerToFirstFrame=${Math.round(timing.firstFrame - timing.answerSet)}ms`);
  }
  metricsEl.textContent = `${parts.length ? `timing ${parts.join(' | ')}` : 'timing: idle'}\n${latestStatsText}`;
  updatePreviewState();
}

function sleep(ms) {
  return new Promise((resolve) => setTimeout(resolve, ms));
}

function signalBaseUrl() {
  const value = signalUrl.value.trim();
  if (!value) throw new Error('signal URL is empty');
  return value.replace(/\/+$/, '');
}

async function postSignal(kind, jsonText) {
  const response = await fetch(`${signalBaseUrl()}/${kind}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: jsonText,
  });
  if (!response.ok) throw new Error(`${kind} POST failed: ${response.status}`);
}

async function getSignal(kind) {
  const response = await fetch(`${signalBaseUrl()}/${kind}?t=${Date.now()}`, {cache: 'no-store'});
  if (response.status === 404) return null;
  if (!response.ok) throw new Error(`${kind} GET failed: ${response.status}`);
  return response.json();
}

function waitForIceGatheringComplete(peer) {
  if (peer.iceGatheringState === 'complete') return Promise.resolve();
  return new Promise((resolve) => {
    const onState = () => {
      if (peer.iceGatheringState === 'complete') {
        peer.removeEventListener('icegatheringstatechange', onState);
        resolve();
      }
    };
    peer.addEventListener('icegatheringstatechange', onState);
  });
}

function applyLowLatencyReceiverHint(receiver) {
  if (!receiver) return;
  if (!('playoutDelayHint' in receiver)) return;
  try {
    receiver.playoutDelayHint = 0;
  } catch (error) {
    console.debug('playoutDelayHint unavailable:', error);
  }
}

function applyH264VideoPreference(transceiver) {
  if (!transceiver || !('setCodecPreferences' in transceiver)) return;
  const caps = RTCRtpReceiver.getCapabilities
    ? RTCRtpReceiver.getCapabilities('video')
    : null;
  const codecs = caps && caps.codecs
    ? caps.codecs.filter((codec) => String(codec.mimeType).toLowerCase() === 'video/h264')
    : [];
  if (!codecs.length) return;
  const packetizationMode1 = codecs.filter((codec) => (
    String(codec.sdpFmtpLine || '').toLowerCase().includes('packetization-mode=1')
  ));
  transceiver.setCodecPreferences(packetizationMode1.length ? packetizationMode1 : codecs);
}

function closePeer() {
  pollToken++;
  stopStatsPolling();
  if (pc) {
    pc.close();
    pc = null;
  }
  remoteVideo.srcObject = null;
  firstFrameWatchArmed = false;
  setStatus('closed');
  renderDiagnostics();
}

async function playRemoteVideo() {
  try {
    await remoteVideo.play();
  } catch (error) {
    setStatus(`video play blocked: ${error.message}`);
  }
}

function armFirstFrameWatch() {
  if (firstFrameWatchArmed) return;
  firstFrameWatchArmed = true;
  const markFirstFrame = () => markTiming('firstFrame');
  if ('requestVideoFrameCallback' in remoteVideo) {
    remoteVideo.requestVideoFrameCallback(markFirstFrame);
  } else {
    remoteVideo.addEventListener('loadeddata', markFirstFrame, {once: true});
  }
}

function stopStatsPolling() {
  statsPollToken++;
  if (statsTimer) {
    clearInterval(statsTimer);
    statsTimer = null;
  }
}

function statValue(stat, key, fallback = '-') {
  return stat[key] ?? fallback;
}

function codecText(report, stat) {
  if (!stat.codecId) return '-';
  const codec = report.get(stat.codecId);
  if (!codec) return '-';
  return [codec.mimeType, codec.sdpFmtpLine].filter(Boolean).join(' ');
}

async function pollVideoStats(peer, token) {
  if (!peer || token !== statsPollToken) return;
  try {
    const report = await peer.getStats();
    let videoText = 'stats video: waiting';
    report.forEach((stat) => {
      if (stat.type !== 'inbound-rtp' || stat.isRemote) return;
      if (stat.kind !== 'video' && stat.mediaType !== 'video') return;
      const jitterDelay = stat.jitterBufferEmittedCount
        ? (stat.jitterBufferDelay / stat.jitterBufferEmittedCount).toFixed(3)
        : '-';
      videoText = [
        `stats video packets=${statValue(stat, 'packetsReceived')}`,
        `bytes=${statValue(stat, 'bytesReceived')}`,
        `framesReceived=${statValue(stat, 'framesReceived')}`,
        `framesDecoded=${statValue(stat, 'framesDecoded')}`,
        `framesDropped=${statValue(stat, 'framesDropped')}`,
        `keyFramesDecoded=${statValue(stat, 'keyFramesDecoded')}`,
        `size=${statValue(stat, 'frameWidth')}x${statValue(stat, 'frameHeight')}`,
        `pli=${statValue(stat, 'pliCount')}`,
        `nack=${statValue(stat, 'nackCount')}`,
        `freeze=${statValue(stat, 'freezeCount')}`,
        `jitterDelay=${jitterDelay}`,
        `codec=${codecText(report, stat)}`,
      ].join(' ');
    });
    latestStatsText = videoText;
  } catch (error) {
    latestStatsText = `stats error: ${error.message}`;
  }
  renderDiagnostics();
}

function startStatsPolling(peer) {
  stopStatsPolling();
  const token = ++statsPollToken;
  pollVideoStats(peer, token);
  statsTimer = setInterval(() => pollVideoStats(peer, token), 1000);
}

async function createOffer() {
  closePeer();
  resetDiagnostics();
  markTiming('offerStart');
  pc = new RTCPeerConnection({iceServers: []});
  const stream = new MediaStream();
  remoteVideo.srcObject = stream;
  pc.addEventListener('track', (event) => {
    applyLowLatencyReceiverHint(event.receiver);
    stream.addTrack(event.track);
    if (event.track.kind === 'video') {
      markTiming('track');
      armFirstFrameWatch();
    }
    playRemoteVideo();
  });
  const audioTransceiver = pc.addTransceiver('audio', {direction: 'recvonly'});
  // Board sender only supports RK1106 G711; force the offer to PCMU/PCMA so the
  // sender-side precheck accepts the negotiated audio codec and audio frames are actually pushed.
  audioTransceiver.setCodecPreferences([
    {mimeType: 'audio/PCMU', clockRate: 8000, channels: 1},
    {mimeType: 'audio/PCMA', clockRate: 8000, channels: 1},
  ]);
  const videoTransceiver = pc.addTransceiver('video', {direction: 'recvonly'});
  applyH264VideoPreference(videoTransceiver);
  applyLowLatencyReceiverHint(audioTransceiver.receiver);
  applyLowLatencyReceiverHint(videoTransceiver.receiver);
  const peer = pc;
  peer.addEventListener('connectionstatechange', () => {
    if (peer.connectionState === 'connected') markTiming('connected');
    setStatus(`connection: ${peer.connectionState}`);
  });
  peer.addEventListener('iceconnectionstatechange', () => {
    if (peer.iceConnectionState === 'connected' || peer.iceConnectionState === 'completed') {
      markTiming('iceConnected');
    }
    setStatus(`ice: ${peer.iceConnectionState}`);
  });
  const offer = await peer.createOffer();
  await peer.setLocalDescription(offer);
  await waitForIceGatheringComplete(peer);
  offerBox.value = JSON.stringify(peer.localDescription, null, 2);
  markTiming('offerReady');
  setStatus('offer ready');
}

async function publishOffer() {
  if (!offerBox.value.trim()) await createOffer();
  await postSignal('offer', offerBox.value);
  markTiming('offerPublished');
  setStatus('offer published');
}

async function setAnswerFromBox() {
  if (!pc) {
    setStatus('create offer first');
    return;
  }
  const answer = JSON.parse(answerBox.value);
  await pc.setRemoteDescription(answer);
  markTiming('answerSet');
  startStatsPolling(pc);
  setStatus('answer set');
  await playRemoteVideo();
}

async function waitForAnswer() {
  if (!pc) {
    setStatus('create offer first');
    return;
  }
  const token = ++pollToken;
  setStatus('waiting for answer');
  const deadline = performance.now() + ANSWER_WAIT_TIMEOUT_MS;
  while (performance.now() < deadline && token === pollToken) {
    const answer = await getSignal('answer');
    if (answer) {
      answerBox.value = JSON.stringify(answer, null, 2);
      await setAnswerFromBox();
      return;
    }
    await sleep(ANSWER_POLL_INTERVAL_MS);
  }
  if (token === pollToken) setStatus('answer wait timed out');
}

const autoSignalButton = document.getElementById('autoSignal');

async function runAutoSignal() {
  try {
    await createOffer();
    await publishOffer();
    await waitForAnswer();
  } catch (error) {
    setStatus(error.message);
  }
}

autoSignalButton.addEventListener('click', runAutoSignal);

document.getElementById('createOffer').addEventListener('click', async () => {
  try {
    await createOffer();
  } catch (error) {
    setStatus(error.message);
  }
});

document.getElementById('publishOffer').addEventListener('click', async () => {
  try {
    await publishOffer();
  } catch (error) {
    setStatus(error.message);
  }
});

document.getElementById('waitAnswer').addEventListener('click', async () => {
  try {
    await waitForAnswer();
  } catch (error) {
    setStatus(error.message);
  }
});

document.getElementById('copyOffer').addEventListener('click', async () => {
  await navigator.clipboard.writeText(offerBox.value);
  setStatus('offer copied');
});

document.getElementById('setAnswer').addEventListener('click', async () => {
  try {
    await setAnswerFromBox();
  } catch (error) {
    setStatus(error.message);
  }
});

document.getElementById('closePeer').addEventListener('click', closePeer);

window.addEventListener('load', () => {
  setTimeout(() => autoSignalButton.click(), 0);
}, {once: true});
</script>
</body>
</html>
